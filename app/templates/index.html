<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub Activity</title>
</head>
<body>
  <h2>Latest GitHub Activity</h2>
  <div id="activity"></div>

  <script>
    async function fetchLatest() {
      const response = await fetch("/events");
      const data = await response.json();

      const container = document.getElementById("activity");
      container.innerHTML = "";

      data.forEach(item => {
        let text = "";

        if (item.action === "PUSH") {
          text = `${item.author} pushed to ${item.to_branch} on ${new Date(item.timestamp).toUTCString()}`;
        }

        if (item.action === "PULL_REQUEST") {
          text = `${item.author} submitted a pull request from ${item.from_branch} to ${item.to_branch} on ${new Date(item.timestamp).toUTCString()}`;
        }

        if (item.action === "MERGE") {
          text = `${item.author} merged branch ${item.from_branch} to ${item.to_branch} on ${new Date(item.timestamp).toUTCString()}`;
        }

        const div = document.createElement("div");
        div.innerText = text;
        container.appendChild(div);
      });
    }

    setInterval(fetchLatest, 15000);
    fetchLatest();
  </script>
</body>
</html>
